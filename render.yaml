services:
  # Servicio web FastAPI
  - type: web
    name: mirel-portfolio
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: USE_MONGODB
        value: false
    healthCheckPath: /health
