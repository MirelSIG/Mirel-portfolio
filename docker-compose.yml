version: '3.8'

services:
  # Aplicación FastAPI
  web:
    build: .
    container_name: mirel-portfolio
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/.venv  # Excluir venv del host
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONUNBUFFERED=1
    depends_on:
      - ollama
    networks:
      - portfolio-network
    restart: unless-stopped

  # Ollama service (opcional)
  ollama:
    image: ollama/ollama:latest
    container_name: mirel-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - portfolio-network
    restart: unless-stopped
    # Descomentar si tienes GPU NVIDIA
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  ollama-data:
    driver: local

networks:
  portfolio-network:
    driver: bridge
